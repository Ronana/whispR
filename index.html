<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WhispR — Adult Audio. Elevated.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0806;
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #f0e6d0;
    }
    .container { text-align: center; }
    .logo { font-size: 72px; letter-spacing: -0.01em; }
    .logo span { color: #c9966a; }
    .tagline {
      font-size: 13px;
      letter-spacing: 0.22em;
      color: #7a6a58;
      text-transform: uppercase;
      margin-top: 16px;
    }
    .coming-soon {
      margin-top: 40px;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #3a3228;
      text-transform: uppercase;
    }
    .email-form {
      margin-top: 24px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    input {
      background: #1c1410;
      border: 1px solid #3a2e22;
      border-radius: 4px;
      padding: 10px 16px;
      color: #f0e6d0;
      font-family: inherit;
      font-size: 13px;
      width: 240px;
      outline: none;
    }
    input::placeholder { color: #4a3e32; }
    button {
      background: #c9966a;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      color: #0a0806;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.15em;
      cursor: pointer;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Whisp<span>R</span></div>
    <p class="tagline">Adult Audio. Elevated.</p>
    <p class="coming-soon">Coming Soon</p>
    <div class="email-form">
      <input type="email" placeholder="Enter your email for early access" />
      <button>Notify Me</button>
    </div>
  </div>
</body>
</html>
